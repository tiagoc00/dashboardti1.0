<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard TI - SOLID</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <!-- EXTERNAL LIBS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  
  <!-- TAILWIND CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            bg: 'var(--bg)', surface: 'var(--surface)', card: 'var(--card)', 
            border: 'var(--border)', border2: 'var(--border2)', text: 'var(--text)', 
            muted: 'var(--muted)', cyan: 'var(--cyan)', blue: 'var(--blue)', 
            purple: 'var(--purple)', amber: 'var(--amber)', green: 'var(--green)', red: 'var(--red)', cdim: 'var(--cdim)' 
          },
          fontFamily: { 
            sans: ['"IBM Plex Sans"', 'sans-serif'], 
            mono: ['"IBM Plex Mono"', 'monospace'] 
          }
        }
      }
    }
  </script>

  <!-- CUSTOM STYLES (Variables & Transitions) -->
  <link rel="stylesheet" href="src/style.css" />
  
  <!-- FIREBASE ES6 MODULE -->
  <script type="module" src="js/firebase.js"></script>
  
  <!-- APP ENTRY -->
  <script type="module" src="src/main.js"></script>
</head>
<body class="bg-bg text-text font-sans min-h-screen selection:bg-cyan/30">

  <!-- LOADING OVERLAY -->
  <div id="loading" class="fixed inset-0 bg-black/90 hidden flex-col items-center justify-center z-[200] gap-3">
    <div class="w-[38px] h-[38px] border-[3px] border-border2 border-t-cyan rounded-full animate-[spin_0.8s_linear_infinite]"></div>
    <p id="lmsg" class="font-mono text-[12px] text-muted">Carregando...</p>
  </div>
  
  <!-- TOAST -->
  <div id="toast" class="fixed bottom-[22px] right-[22px] bg-card border border-border2 rounded-[10px] p-3 text-[12px] flex items-center gap-[10px] translate-y-[80px] opacity-0 transition-all z-[999] min-w-[260px] shadow-2xl">
    <span id="ticon" class="text-[14px]">i</span><span id="tmsg" class="font-medium"></span>
  </div>

  <!-- MODALS ROOT -->
  <div id="modal-root"></div>

  <!-- APP ROOT -->
  <div id="root">
    <div class="flex items-center justify-center h-screen">
       <div class="animate-pulse flex flex-col items-center gap-4">
          <div class="w-12 h-12 border-[3px] border-border2 border-t-cyan rounded-full animate-spin"></div>
          <p class="text-muted font-mono text-xs">Inicializando App...</p>
       </div>
    </div>
  </div>

</body>
</html>
